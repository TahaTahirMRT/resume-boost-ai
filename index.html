<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ResumeBoost AI</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="style.css">
</head>

<body class="bg-gray-950 text-white min-h-screen flex flex-col justify-between">

  <div class="flex items-center justify-center p-6 flex-grow">

    <div class="glass w-full max-w-4xl p-8 rounded-2xl shadow-2xl">

      <h1 class="text-3xl font-bold text-center mb-2">
        🚀 ResumeBoost AI
      </h1>

      <p class="text-center text-gray-400 mb-6">
        Advanced ATS Resume Analyzer & LinkedIn Optimizer
      </p>

      <textarea 
        id="resumeInput"
        placeholder="Paste your resume text here..."
        class="w-full h-40 p-4 rounded-lg bg-gray-800 border border-gray-700 focus:outline-none focus:ring-2 focus:ring-blue-500 mb-4">
      </textarea>

      <select 
        id="jobRole"
        class="w-full p-3 rounded-lg bg-gray-800 border border-gray-700 mb-4">

        <option value="frontend">Frontend Developer</option>
        <option value="backend">Backend Developer</option>
        <option value="data">Data Analyst</option>
        <option value="fullstack">Full Stack Developer</option>
        <option value="devops">DevOps Engineer</option>
        <option value="cybersecurity">Cyber Security Analyst</option>
        <option value="mobile">Mobile App Developer</option>
        <option value="uiux">UI/UX Designer</option>

      </select>

      <button 
        onclick="analyzeResume()"
        class="w-full bg-blue-600 hover:bg-blue-700 p-3 rounded-lg font-semibold">
        Analyze Resume
      </button>

      <div id="results" class="mt-8"></div>

    </div>

  </div>

  <!-- Footer -->
  <footer class="text-center py-4 text-gray-500 text-sm">
    ✨ Designed by <span class="text-blue-400 font-semibold">Taha Tahir</span>
  </footer>

<script src="script.js"></script>
</body>
</html>
